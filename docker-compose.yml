version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sakhcom
      POSTGRES_PASSWORD: sakhcom_dev
      POSTGRES_DB: sakhcom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sakhcom"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  typesense:
    image: typesense/typesense:26.0
    ports:
      - "8108:8108"
    environment:
      TYPESENSE_API_KEY: sakhcom_typesense_dev_key
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesensedata:/data
    command: >
      --data-dir /data
      --api-key sakhcom_typesense_dev_key
      --listen-port 8108
      --enable-cors

volumes:
  pgdata:
  redisdata:
  typesensedata:
